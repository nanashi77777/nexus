<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - NEXUS知因</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-brain"></i>
                    <h1>NEXUS知因</h1>
                </div>
                <p class="auth-subtitle">创建新账户</p>
            </div>

            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="register-username">用户名</label>
                    <div class="input-with-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" id="register-username" placeholder="请输入用户名" required>
                    </div>
                    <small class="form-hint">3-16个字符，只能包含字母、数字、下划线和连字符</small>
                </div>
                <div class="form-group">
                    <label for="register-email">邮箱地址</label>
                    <div class="input-with-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="register-email" placeholder="请输入邮箱地址" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="register-password">密码</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="register-password" placeholder="请输入密码" required>
                        <button type="button" class="btn-toggle-password" data-target="register-password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <small class="form-hint">8-20个字符，必须包含字母、数字和特殊字符</small>
                </div>
                <div class="form-group">
                    <label for="register-confirm-password">确认密码</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="register-confirm-password" placeholder="请再次输入密码" required>
                        <button type="button" class="btn-toggle-password" data-target="register-confirm-password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="register-invite-code">邀请码（可选）</label>
                    <div class="input-with-icon">
                        <i class="fas fa-ticket-alt"></i>
                        <input type="text" id="register-invite-code" placeholder="如有邀请码请填写">
                    </div>
                </div>
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="accept-terms" required>
                        <span>我已阅读并同意 <a href="#">服务条款</a> 和 <a href="#">隐私政策</a></span>
                    </label>
                </div>
                <button type="submit" class="btn-auth btn-primary" id="register-submit">
                    <i class="fas fa-user-plus"></i>
                    注册
                </button>
            </form>

            <div class="auth-divider">
                <span>或</span>
            </div>

            <div class="auth-social">
                <button class="btn-social btn-google">
                    <i class="fab fa-google"></i>
                    Google 注册
                </button>
                <button class="btn-social btn-github">
                    <i class="fab fa-github"></i>
                    GitHub 注册
                </button>
            </div>

            <div class="auth-footer">
                <p>已有账户？ <a href="/login" class="auth-link">立即登录</a></p>
            </div>
        </div>

        <div class="auth-features">
            <h2>加入 NEXUS知因</h2>
            <div class="features-list">
                <div class="feature-item">
                    <i class="fas fa-graduation-cap"></i>
                    <h3>个性化学习路径</h3>
                    <p>根据您的兴趣和目标，推荐最适合的学习资源</p>
                </div>
                <div class="feature-item">
                    <i class="fas fa-brain"></i>
                    <h3>知识图谱构建</h3>
                    <p>自动构建知识关联，帮助您形成系统化的知识体系</p>
                </div>
                <div class="feature-item">
                    <i class="fas fa-chart-line"></i>
                    <h3>学习进度跟踪</h3>
                    <p>可视化学习进度，帮助您保持学习动力</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 切换密码可见性
            document.querySelectorAll('.btn-toggle-password').forEach(button => {
                button.addEventListener('click', function() {
                    const targetId = this.getAttribute('data-target');
                    const passwordInput = document.getElementById(targetId);
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    this.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
                });
            });

            // 处理注册表单提交
            const registerForm = document.getElementById('register-form');
            registerForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const username = document.getElementById('register-username').value.trim();
                const email = document.getElementById('register-email').value.trim();
                const password = document.getElementById('register-password').value.trim();
                const confirmPassword = document.getElementById('register-confirm-password').value.trim();
                const inviteCode = document.getElementById('register-invite-code').value.trim();
                const acceptTerms = document.getElementById('accept-terms').checked;
                
                // 基本验证
                if (!username || !email || !password || !confirmPassword) {
                    showAuthError('请填写所有必填字段');
                    return;
                }
                
                if (!acceptTerms) {
                    showAuthError('请同意服务条款和隐私政策');
                    return;
                }
                
                if (password !== confirmPassword) {
                    showAuthError('两次输入的密码不一致');
                    return;
                }
                
                // 密码强度验证
                const passwordRegex = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,20}$/;
                if (!passwordRegex.test(password)) {
                    showAuthError('密码必须包含字母、数字和特殊字符，长度8-20位');
                    return;
                }

                const submitBtn = document.getElementById('register-submit');
                const originalText = submitBtn.innerHTML;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 注册中...';
                submitBtn.disabled = true;

                try {
                    const response = await fetch('/api/v1/user/register', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            username: username,
                            email: email,
                            password: password,
                            inviteCode: inviteCode || null
                        })
                    });

                    const result = await response.json();
                    
                    if (result.code === 200) {
                        // 注册成功
                        showAuthSuccess('注册成功，正在跳转到登录页面...');
                        
                        // 跳转到登录页面
                        setTimeout(() => {
                            window.location.href = '/login';
                        }, 2000);
                    } else {
                        showAuthError(result.msg || '注册失败，请检查输入信息');
                    }
                } catch (error) {
                    console.error('注册请求失败:', error);
                    showAuthError('网络错误，请检查网络连接');
                } finally {
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            });

            function showAuthError(message) {
                // 移除旧的消息
                const oldError = document.querySelector('.auth-error');
                if (oldError) oldError.remove();
                
                // 创建错误消息元素
                const errorDiv = document.createElement('div');
                errorDiv.className = 'auth-error';
                errorDiv.innerHTML = `
                    <i class="fas fa-exclamation-circle"></i>
                    <span>${message}</span>
                `;
                
                // 插入到表单前
                registerForm.parentNode.insertBefore(errorDiv, registerForm);
                
                // 3秒后自动移除
                setTimeout(() => {
                    if (errorDiv.parentNode) {
                        errorDiv.parentNode.removeChild(errorDiv);
                    }
                }, 3000);
            }

            function showAuthSuccess(message) {
                // 移除旧的消息
                const oldSuccess = document.querySelector('.auth-success');
                if (oldSuccess) oldSuccess.remove();
                
                // 创建成功消息元素
                const successDiv = document.createElement('div');
                successDiv.className = 'auth-success';
                successDiv.innerHTML = `
                    <i class="fas fa-check-circle"></i>
                    <span>${message}</span>
                `;
                
                // 插入到表单前
                registerForm.parentNode.insertBefore(successDiv, registerForm);
            }

            // 检查是否已经登录
            checkLoginStatus();
        });

        function checkLoginStatus() {
            const token = localStorage.getItem('token');
            if (token) {
                // 验证token是否有效
                fetch('/api/v1/users/query/basic', {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                })
                .then(response => {
                    if (response.ok) {
                        // 已经登录，跳转到首页
                        window.location.href = '/';
                    }
                })
                .catch(() => {
                    // token无效，清除本地存储
                    localStorage.removeItem('token');
                });
            }
        }
    </script>
</body>
</html>
