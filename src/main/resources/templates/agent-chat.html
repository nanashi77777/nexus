<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能体对话 - NEXUS知因</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script th:inline="javascript">
        const currentUsername = /*[[${#session.getAttribute('username')}]]*/ '用户';
    </script>
</head>
<body>
    <div class="container">
        <!-- 顶部导航栏 -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-brain"></i>
                <h1>NEXUS知因</h1>
                <span class="tagline">智能学习系统</span>
            </div>
            <nav class="main-nav">
                <ul>
                    <li data-tab="learning-space"><i class="fas fa-layer-group"></i> 学习空间</li>
                    <li data-tab="knowledge-graph"><i class="fas fa-project-diagram"></i> 知识图谱</li>
                    <li class="active" data-tab="agent-chat"><i class="fas fa-robot"></i> 智能体对话</li>
                </ul>
            </nav>
            <div class="user-menu">
                <div class="user-avatar">
                    <i class="fas fa-user-circle"></i>
                </div>
                <span class="user-name" id="current-username">加载中...</span>
                <i class="fas fa-chevron-down"></i>
            </div>
        </header>

        <main class="main-content">
            <!-- 智能体对话界面 -->
            <section id="agent-chat" class="tab-content active">
                <div class="chat-layout">
                    <!-- 左侧会话列表 -->
                    <aside class="chat-sidebar">
                        <div class="chat-sidebar-header">
                            <h3><i class="fas fa-comments"></i> 对话会话</h3>
                            <button class="btn-create" id="new-chat-btn">
                                <i class="fas fa-plus"></i> 新建
                            </button>
                        </div>
                        <div class="chat-sessions" id="chat-sessions-list">
                            <!-- 会话列表将通过JavaScript动态加载 -->
                            <div class="loading-spinner">
                                <i class="fas fa-spinner fa-spin"></i> 加载会话...
                            </div>
                        </div>
                        <div class="chat-tools">
                            <h3><i class="fas fa-wrench"></i> 可用工具</h3>
                            <div class="tool-list">
                                <div class="tool-item">
                                    <i class="fas fa-search"></i>
                                    <span>知识检索</span>
                                </div>
                                <div class="tool-item">
                                    <i class="fas fa-file-code"></i>
                                    <span>代码生成</span>
                                </div>
                                <div class="tool-item">
                                    <i class="fas fa-chart-line"></i>
                                    <span>数据分析</span>
                                </div>
                                <div class="tool-item">
                                    <i class="fas fa-question-circle"></i>
                                    <span>问题解答</span>
                                </div>
                            </div>
                        </div>
                    </aside>

                    <!-- 中间对话区域 -->
                    <div class="chat-main">
                        <div class="chat-header">
                            <h2 id="current-session-title">选择对话会话</h2>
                            <div class="chat-actions">
                                <button class="btn-icon" title="停止生成" id="stop-generation"><i class="fas fa-stop"></i></button>
                                <button class="btn-icon" title="清空对话" id="clear-chat"><i class="fas fa-trash"></i></button>
                                <button class="btn-icon" title="对话设置"><i class="fas fa-cog"></i></button>
                            </div>
                        </div>
                        <div class="chat-messages" id="chat-messages">
                            <!-- 消息将在这里动态添加 -->
                            <div class="empty-state">
                                <i class="fas fa-comment-dots"></i>
                                <p>选择一个会话以查看消息，或新建一个会话开始对话</p>
                            </div>
                        </div>
                        <div class="chat-input-container">
                            <div class="input-tools">
                                <button class="btn-icon" title="附件"><i class="fas fa-paperclip"></i></button>
                                <button class="btn-icon" title="表情"><i class="fas fa-smile"></i></button>
                                <button class="btn-icon" title="工具面板" id="toggle-tools"><i class="fas fa-toolbox"></i></button>
                            </div>
                            <textarea 
                                id="chat-input" 
                                placeholder="输入消息...（输入 / 使用工具，Shift+Enter 换行）" 
                                rows="1"
                                disabled
                            ></textarea>
                            <button class="btn-send" id="send-message" disabled>
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>

                    <!-- 右侧工具面板 -->
                    <aside class="chat-tools-panel">
                        <h3><i class="fas fa-toolbox"></i> 工具面板</h3>
                        <div class="tools-panel-content">
                            <div class="active-tool">
                                <h4>当前工具: <span id="current-tool">知识检索</span></h4>
                                <div class="tool-config">
                                    <label for="tool-source">数据源:</label>
                                    <select id="tool-source">
                                        <option>机器学习基础</option>
                                        <option>Web开发进阶</option>
                                        <option>全部知识库</option>
                                    </select>
                                    <label for="tool-depth">检索深度:</label>
                                    <input type="range" id="tool-depth" min="1" max="10" value="5">
                                    <span id="depth-value">5</span>
                                </div>
                                <button class="btn-toolbar" id="authorize-tool">
                                    <i class="fas fa-key"></i>
                                    授权使用
                                </button>
                            </div>
                            <div class="tool-history">
                                <h4>工具使用历史</h4>
                                <ul id="tool-history-list">
                                    <li>暂无历史记录</li>
                                </ul>
                            </div>
                        </div>
                    </aside>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>© 2023 NEXUS知因 智能学习系统 | 遵循 WCAG 2.1 可访问性标准 | 响应式设计支持 PC、平板和移动端</p>
        </footer>
    </div>

    <!-- 模态框：创建新会话 -->
    <div class="modal" id="create-session-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-plus"></i> 创建新会话</h3>
                <button class="btn-close" id="close-create-session-modal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="create-session-form">
                    <div class="form-group">
                        <label for="session-name">会话名称</label>
                        <input type="text" id="session-name" placeholder="输入会话名称" required>
                    </div>
                    <div class="form-group">
                        <label for="session-description">会话描述</label>
                        <textarea id="session-description" rows="3" placeholder="描述这个会话的主题"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="session-model">AI模型</label>
                        <select id="session-model">
                            <option value="deepseek-chat">DeepSeek Chat</option>
                            <option value="qwen-max">Qwen Max</option>
                            <option value="gpt-4">GPT-4</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancel-create-session">取消</button>
                <button class="btn-primary" id="submit-create-session">创建会话</button>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
    <script>
        // 页面初始化脚本
        document.addEventListener('DOMContentLoaded', function() {
            // 更新用户名显示
            if (currentUsername && currentUsername !== '用户') {
                document.getElementById('current-username').textContent = currentUsername;
            } else {
                fetch('/api/v1/users/query/basic', {
                    headers: {
                        'Authorization': 'Bearer ' + (localStorage.getItem('token') || '')
                    }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.code === 200 && data.data) {
                        document.getElementById('current-username').textContent = data.data.username || '用户';
                    }
                })
                .catch(() => {
                    document.getElementById('current-username').textContent = '用户';
                });
            }

            // 加载对话会话数据
            loadChatSessions();
        });

        let currentSessionId = null;

        async function loadChatSessions() {
            try {
                const response = await fetch('/api/v1/agent/query/sessions?page=1&size=10', {
                    headers: {
                        'Authorization': 'Bearer ' + (localStorage.getItem('token') || '')
                    }
                });
                
                if (response.ok) {
                    const result = await response.json();
                    if (result.code === 200 && result.data) {
                        renderSessionList(result.data.records || []);
                    }
                }
            } catch (error) {
                console.error('加载会话列表失败:', error);
                document.getElementById('chat-sessions-list').innerHTML = 
                    '<div class="error-message">加载失败，请刷新页面重试</div>';
            }
        }

        function renderSessionList(sessions) {
            const sessionList = document.getElementById('chat-sessions-list');
            if (!sessions || sessions.length === 0) {
                sessionList.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-comment-slash"></i>
                        <p>暂无对话会话</p>
                        <button class="btn-create" id="create-first-session">创建第一个会话</button>
                    </div>
                `;
                document.getElementById('create-first-session').addEventListener('click', createNewSession);
                return;
            }

            let html = '';
            sessions.forEach((session, index) => {
                const date = session.createTime ? new Date(session.createTime).toLocaleDateString() : '未知日期';
                const messageCount = session.messageCount || 0;
                html += `
                    <div class="chat-session ${index === 0 ? 'active' : ''}" data-session-id="${session.id}">
                        <div class="session-icon">
                            <i class="fas fa-comment"></i>
                        </div>
                        <div class="session-info">
                            <h4>${session.name || '未命名会话'}</h4>
                            <p>${date} • ${messageCount}条消息</p>
                        </div>
                    </div>
                `;
            });

            sessionList.innerHTML = html;
            
            // 添加点击事件
            document.querySelectorAll('.chat-session').forEach(item => {
                item.addEventListener('click', function() {
                    document.querySelectorAll('.chat-session').forEach(s => s.classList.remove('active'));
                    this.classList.add('active');
                    
                    const sessionId = this.getAttribute('data-session-id');
                    const sessionName = this.querySelector('h4').textContent;
                    
                    document.getElementById('current-session-title').textContent = sessionName;
                    currentSessionId = sessionId;
                    loadSessionMessages(sessionId);
                    
                    // 启用输入框和发送按钮
                    document.getElementById('chat-input').disabled = false;
                    document.getElementById('send-message').disabled = false;
                });
            });

            // 默认加载第一个会话的数据
            if (sessions.length > 0) {
                const firstSessionId = sessions[0].id;
                const firstName = sessions[0].name || '未命名会话';
                document.getElementById('current-session-title').textContent = firstName;
                currentSessionId = firstSessionId;
                loadSessionMessages(firstSessionId);
                
                // 启用输入框和发送按钮
                document.getElementById('chat-input').disabled = false;
                document.getElementById('send-message').disabled = false;
            }
        }

        async function loadSessionMessages(sessionId) {
            try {
                const response = await fetch(`/api/v1/agent/query/messages?sessionId=${sessionId}&page=1&size=50`, {
                    headers: {
                        'Authorization': 'Bearer ' + (localStorage.getItem('token') || '')
                    }
                });
                
                if (response.ok) {
                    const result = await response.json();
                    if (result.code === 200 && result.data) {
                        renderMessageList(result.data.records || []);
                    }
                }
            } catch (error) {
                console.error('加载消息失败:', error);
                document.getElementById('chat-messages').innerHTML = 
                    '<div class="error-message">加载消息失败</div>';
            }
        }

        function renderMessageList(messages) {
            const chatMessages = document.getElementById('chat-messages');
            
            if (!messages || messages.length === 0) {
                chatMessages.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-comment-dots"></i>
                        <p>暂无消息，开始对话吧！</p>
                    </div>
                `;
                return;
            }

            let html = '';
            messages.forEach(message => {
                const isUser = message.senderType === 'USER';
                const time = message.createTime ? new Date(message.createTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '未知时间';
                
                html += `
                    <div class="message ${isUser ? 'user' : 'assistant'}">
                        <div class="message-avatar">
                            <i class="fas fa-${isUser ? 'user' : 'robot'}"></i>
                        </div>
                        <div class="message-content">
                            <div class="message-header">
                                <strong>${isUser ? '用户' : 'AI助手'}</strong>
                                <span class="message-time">${time}</span>
                            </div>
                            <p>${message.content || ''}</p>
                            ${message.thinking ? `
                                <div class="thinking-process">
                                    <details>
                                        <summary>思考过程 <i class="fas fa-chevron-down"></i></summary>
                                        <p>${message.thinking}</p>
                                    </details>
                                </div>
                            ` : ''}
                            ${message.toolCall ? `
                                <div class="tool-call">
                                    <div class="tool-header">
                                        <i class="fas fa-toolbox"></i>
                                        <strong>调用了工具: ${message.toolCall.name}</strong>
                                    </div>
                                    <div class="tool-params">
                                        <strong>参数:</strong> ${JSON.stringify(message.toolCall.params)}
                                    </div>
                                    <div class="tool-result">
                                        <strong>结果:</strong> ${message.toolCall.result}
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            });

            chatMessages.innerHTML = html;
            scrollChatToBottom();
        }

        function scrollChatToBottom() {
            const chatMessages = document.getElementById('chat-messages');
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function createNewSession() {
            const sessionName = prompt('请输入新会话名称:', '新对话');
            if (sessionName) {
                // 这里应该调用创建会话的API
                // fetch('/api/v1/agent/sessions', {
                //     method: 'POST',
                //     headers: {
                //         'Authorization': 'Bearer ' + (localStorage.getItem('token') || ''),
                //         'Content-Type': 'application/json'
                //     },
                //     body: JSON.stringify({ name: sessionName })
                // })
                // .then(response => response.json())
                // .then(data => {
                //     if (data.code === 200) {
                //         loadChatSessions(); // 重新加载会话列表
                //     }
                // });

                // 为了演示，我们直接在前端添加一个新会话
                const newSession = {
                    id: Date.now(), // 临时ID
                    name: sessionName,
                    createTime: new Date().toISOString(),
                    messageCount: 0
                };
                
                // 重新加载会话列表（实际应该从API获取最新列表）
                // 这里为了简单，我们模拟一下
                loadChatSessions();
                showNotification(`新会话"${sessionName}"已创建`, 'success');
            }
        }

        // 发送消息
        document.getElementById('send-message').addEventListener('click', sendMessage);
        document.getElementById('chat-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message || !currentSessionId) return;

            // 添加用户消息到界面
            addMessageToUI({
                senderType: 'USER',
                content: message,
                createTime: new Date().toISOString()
            });

            // 清空输入框
            input.value = '';
            input.style.height = 'auto';
            
            // 滚动到底部
            scrollChatToBottom();

            // 调用后端流式聊天API
            try {
                await streamChat(message, currentSessionId);
            } catch (error) {
                console.error('聊天请求失败:', error);
                // 显示错误消息
                addMessageToUI({
                    senderType: 'ASSISTANT',
                    content: '抱歉，请求出现错误。请检查网络连接或稍后重试。',
                    createTime: new Date().toISOString()
                });
                showNotification('请求失败', 'error');
            }
        }

        function addMessageToUI(message) {
            const chatMessages = document.getElementById('chat-messages');
            
            // 如果当前显示的是空状态，先清空
            if (chatMessages.querySelector('.empty-state')) {
                chatMessages.innerHTML = '';
            }
            
            const isUser = message.senderType === 'USER';
            const time = new Date(message.createTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            const messageElement = document.createElement('div');
            messageElement.className = `message ${isUser ? 'user' : 'assistant'}`;
            messageElement.innerHTML = `
                <div class="message-avatar">
                    <i class="fas fa-${isUser ? 'user' : 'robot'}"></i>
                </div>
                <div class="message-content">
                    <div class="message-header">
                        <strong>${isUser ? '用户' : 'AI助手'}</strong>
                        <span class="message-time">${time}</span>
                    </div>
                    <p>${message.content || ''}</p>
                </div>
            `;
            
            chatMessages.appendChild(messageElement);
            scrollChatToBottom();
        }

        async function streamChat(message, sessionId) {
            // 创建AI消息占位符
            const aiMessage = {
                senderType: 'ASSISTANT',
                content: '',
                createTime: new Date().toISOString(),
                thinking: null,
                toolCall: null
            };
            
            addMessageToUI(aiMessage);
            
            // 获取token（这里需要根据实际情况调整）
            const token = localStorage.getItem('token') || '';
            
            try {
                const response = await fetch('/api/v1/agent/chat/stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ 
                        message: message,
                        sessionId: sessionId
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                let aiMessageElement = document.querySelector('#chat-messages .message:last-child');
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) {
                        break;
                    }
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6); // 去掉"data: "
                            
                            // 检查流是否结束
                            if (data.trim() === '[DONE]') {
                                break;
                            }
                            
                            try {
                                const parsed = JSON.parse(data);
                                if (parsed.code === 200 && parsed.data) {
                                    // 更新消息内容
                                    if (parsed.data.content) {
                                        aiMessage.content += parsed.data.content;
                                        const contentElement = aiMessageElement.querySelector('.message-content p');
                                        if (contentElement) {
                                            contentElement.textContent = aiMessage.content;
                                        }
                                        scrollChatToBottom();
                                    }
                                    
                                    // 更新思考过程
                                    if (parsed.data.thinking) {
                                        aiMessage.thinking = parsed.data.thinking;
                                        let thinkingElement = aiMessageElement.querySelector('.thinking-process');
                                        if (!thinkingElement) {
                                            const thinkingHTML = `
                                                <div class="thinking-process">
                                                    <details>
                                                        <summary>思考过程 <i class="fas fa-chevron-down"></i></summary>
                                                        <p>${parsed.data.thinking}</p>
                                                    </details>
                                                </div>
                                            `;
                                            aiMessageElement.querySelector('.message-content').insertAdjacentHTML('beforeend', thinkingHTML);
                                        }
                                    }
                                    
                                    // 更新工具调用
                                    if (parsed.data.toolCall) {
                                        aiMessage.toolCall = parsed.data.toolCall;
                                        let toolCallElement = aiMessageElement.querySelector('.tool-call');
                                        if (!toolCallElement) {
                                            const toolCallHTML = `
                                                <div class="tool-call">
                                                    <div class="tool-header">
                                                        <i class="fas fa-toolbox"></i>
                                                        <strong>调用了工具: ${parsed.data.toolCall.name}</strong>
                                                    </div>
                                                    <div class="tool-params">
                                                        <strong>参数:</strong> ${JSON.stringify(parsed.data.toolCall.params)}
                                                    </div>
                                                    <div class="tool-result">
                                                        <strong>结果:</strong> ${parsed.data.toolCall.result}
                                                    </div>
                                                </div>
                                            `;
                                            aiMessageElement.querySelector('.message-content').insertAdjacentHTML('beforeend', toolCallHTML);
                                        }
                                    }
                                }
                            } catch (e) {
                                console.error('解析SSE事件失败:', e, '原始数据:', data);
                            }
                        }
                    }
                }
                
                reader.releaseLock();
                showNotification('AI助手回复完成', 'success');
                
            } catch (error) {
                console.error('读取流式响应失败:', error);
                throw error;
            }
        }

        function showNotification(message, type = 'info') {
            // 使用script.js中的通知函数
            if (window.showNotification) {
                window.showNotification(message, type);
            } else {
                console.log(`[${type.toUpperCase()}] ${message}`);
            }
        }
    </script>
</body>
</html>
